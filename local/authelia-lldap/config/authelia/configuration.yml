###############################################################
#                   Authelia configuration                    #
###############################################################
server:
  address: 'tcp://0.0.0.0:9091/'
  buffers:
    read: 8192
    write: 8192
log:
  level: info
telemetry:
  metrics:
    enabled: false
totp:
  issuer: {{ "op://DockerSecrets/authelia-lldap/totp-issuer" }}
  algorithm: 'SHA1'
  digits: 6
  period: 30
  skew: 1
theme: dark

webauthn:
  disable: false
  timeout: '60 seconds'
  display_name: {{ "op://DockerSecrets/authelia-lldap/webauthn-display_name" }}
  attestation_conveyance_preference: 'indirect'
  filtering:
    permitted_aaguids: []
    prohibited_aaguids: []
    prohibit_backup_eligibility: false
  selection_criteria:
    attachment: ''
    discoverability: 'preferred'
    user_verification: 'preferred'
  metadata:
    enabled: false
    validate_trust_anchor: true
    validate_entry: true
    validate_entry_permit_zero_aaguid: false
    validate_status: true
    validate_status_permitted: []
    validate_status_prohibited:
      - 'REVOKED'
      - 'USER_KEY_PHYSICAL_COMPROMISE'
      - 'USER_KEY_REMOTE_COMPROMISE'
      - 'USER_VERIFICATION_BYPASS'
      - 'ATTESTATION_KEY_COMPROMISE'

identity_validation:
  reset_password:
    jwt_lifespan: '15 minutes'
    jwt_algorithm: 'HS256'
    jwt_secret: {{ "op://DockerSecrets/authelia-lldap/identity_validation-reset_password-jwt_secret" }}
  elevated_session:
    code_lifespan: '5 minutes'
    elevation_lifespan: '15 minutes'
    characters: 8
    require_second_factor: true
    skip_second_factor: false

authentication_backend:
  password_reset:
    disable: false
  refresh_interval: 1m
  ldap:
    implementation: custom
    address: ldap://lldap:3890
    timeout: 5s
    start_tls: false
    base_dn: dc={{ "op://DockerSecrets/authelia-lldap/bbvutbry72dndqr4jb5ztnb6ly" }},dc={{ "op://DockerSecrets/authelia-lldap/fn6td4aiimcj4ee37uc5njqn74" }}
    additional_users_dn: ou=people
    users_filter: "(&(|({username_attribute}={input})({mail_attribute}={input}))(objectClass=person))"
    additional_groups_dn: ou=groups
    groups_filter: "(member={dn})"
    group_search_mode: 'filter'
    user: {{ "op://DockerSecrets/authelia-lldap/authentication_backend-ldap-user" }}
    password: {{ "op://DockerSecrets/authelia-lldap/authentication_backend-ldap-password" }}
    attributes:
      distinguished_name: 'distinguishedName'
      username: 'uid'
      display_name: 'displayName'
      mail: 'mail'
      member_of: 'memberOf'
      group_name: 'cn'

password_policy: 
    standard:
      enabled: true
      min_length: 12
      max_length: 0
      require_uppercase: true
      require_lowercase: true
      require_number: true
      require_special: true

privacy_policy:
  enabled: false
  require_user_acceptance: false
  policy_url: ''

access_control:
  default_policy: deny
  networks:
    - name: 'internal'
      networks:
        - '192.168.0.0/16'
    - name: 'VPN'
      networks: '10.9.0.0/16'

{{ op://DockerSecrets/authelia-lldap/rules.yml }}

session:
  name: authelia_session
  secret: {{ op://DockerSecrets/authelia-lldap/jcv3xxyh4ixy32wbt7lgkzhlsq }}
  expiration: '3h'
  inactivity: '15m'
  remember_me: '1M'
  same_site: 'lax'
  cookies:
    - domain: {{ "op://DockerSecrets/authelia-lldap/session-cookies-domain" }}
      name: 'authelia_session'
      authelia_url: {{ "op://DockerSecrets/authelia-lldap/session-cookies-authelia_url" }}
      default_redirection_url: {{ "op://DockerSecrets/authelia-lldap/session-cookies-default_redirection_url" }}
      same_site: 'lax'
      inactivity: '5 minutes'
      expiration: '1 hour'
      remember_me: '2 weeks'

  redis:
    host: redisauthelia
    port: 6379
    database_index: 0

regulation:
  max_retries: 5
  find_time: 60m
  ban_time: 72h

storage:
  encryption_key: {{ "op://DockerSecrets/authelia-lldap/storeage-encryption_key" }}
  postgres:
    address: 'tcp://authdb:5432'
    database: {{ "op://DockerSecrets/authelia-lldap/storeage-postgres-database" }}
    schema: 'public'
    username: {{ "op://DockerSecrets/authelia-lldap/storeage-postgres-username" }}
    password: {{ "op://DockerSecrets/authelia-lldap/storeage-postgres-password" }}
    timeout: '5s'        

notifier:
  disable_startup_check: false
  smtp:
    username: {{ "op://DockerSecrets/authelia-lldap/notifier-smtp-username" }}
    password: {{ "op://DockerSecrets/authelia-lldap/notifier-smtp-password" }}
    address: 'smtp://mail.smtp2go.com:587'
    subject: "[{{ op://DockerSecrets/authelia-lldap/notifier-smtp-subject }}] {title}"
    sender: "Admin <{{ op://DockerSecrets/authelia-lldap/notifier-smtp-sender }}>"
    disable_require_tls: false
    disable_starttls: false
    disable_html_emails: false

identity_providers:
  oidc:
    hmac_secret: '{{ op://DockerSecrets/authelia-lldap/identity_providers-oidc-hmac_secret }}'
    jwks:
      - key: {{ "{{ secret \"/config/key.key\" | mindent 10 \"|\" | msquote }}" }}
    lifespans:
      access_token: '1h'
      authorize_code: '1m'
      id_token: '1h'
      refresh_token: '90m'
    enable_client_debug_messages: false
    enforce_pkce: always
    cors:
      endpoints:
        - authorization
        - token
        - revocation
        - introspection
      allowed_origins:
        - {{ op://DockerSecrets/authelia-lldap/identity_providers-oidc-cors-allowed_origins }}
      allowed_origins_from_client_redirect_uris: false
    clients:
      - client_id: 4tXYBB2faJHB2WTWxqvGqoNJpApEY.Proxmox
        client_name: Proxmox
        client_secret: $pbkdf2-sha512$310000$2khkiXHMortOY/iDNBBymA$sFLHRTXZaOOuJZh3TpExSo1WzzC/Ash6dFSgjvgdTCdL8ZGadFuQN.TrJMcrk2SzKBASBgUctKVKIR93ZyrDag
        #sector_identifier_uri: ''
        public: false
        authorization_policy: two_factor
        pre_configured_consent_duration: 1w
        redirect_uris:
          - {{ op://DockerSecrets/authelia-lldap/identity_providers-oidc-redirect_uris }}
        scopes:
          - openid
          - profile
          - email
        userinfo_signed_response_alg: none
