services:
  locket:
    image: ghcr.io/bpbradley/locket:op
    user: '65532:65532'
    container_name: locket-auth
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      - '--provider=op'
      - '--mode=one-shot'
      - '--inject-failure-policy=error'
      - '--log-template=compose'
      - '--log-level=info'
      - '--op-token=file:/run/secrets/op_token'
      - '--secret=encryption_key={{ op://DockerSecrets/authdb/encryption_key }}'
    secrets:
      - op_token
    volumes:
      - secrets-store-dockhand:/run/secrets/locket

  socket-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: socket-proxy
    restart: unless-stopped
    environment:
      # Required for Dockhand core functionality
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - VOLUMES=1
      - EVENTS=1
      - POST=1
      - DELETE=1
      # Required for dashboard host info and disk usage
      - INFO=1
      - SYSTEM=1
      # Required for vulnerability scanning
      - ALLOW_START=1
      - ALLOW_STOP=1
      - ALLOW_RESTARTS=1
      # Optional: enable for terminal access
      # - EXEC=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - socket-proxy

  dockhand:
    image: fnsys/dockhand:latest
    container_name: dockhand
    restart: unless-stopped
    # Override the default entrypoint to load the encryption key from the secret file into an environment variable without writing
    # them to disk, then exec the original entrypoint
    # https://github.com/Finsys/dockhand/blob/main/Dockerfile
    entrypoint:
      ['/sbin/tini', '--', '/init.sh -f /run/secretsDH/locket/encryption_key']
    command: ['/bin/sh', '/usr/local/bin/docker-entrypoint.sh']
    group_add:
      - 999 #docker group
    ports:
      - '3000:3000'
    volumes:
      - ../../common/scripts/init.sh:/init.sh:ro
      - secrets-store-dockhand:/run/secrets/locketDH
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/dockhand:/opt/dockhand
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - DATA_DIR=/opt/dockhand
      networks:
      - socket-proxy
      - default

secrets:
  op_token:
    file: /etc/op/token

volumes:
  secrets-store-dockhand:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
networks:
  socket-proxy:
    internal: true
