services:
  locket:
    image: ghcr.io/bpbradley/locket:op
    user: '65532:65532'
    container_name: locket-auth
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      - '--provider=op'
      - '--mode=one-shot'
      - '--inject-failure-policy=error'
      - '--log-template=compose'
      - '--log-level=info'
      - '--op-token=file:/run/secrets/op_token'
      - '--secret=encryption_key={{ op://DockerSecrets/authdb/encryption_key }}'
    secrets:
      - op_token
    volumes:
      - secrets-store-dockhand:/run/secrets/locket

  dockhand:
    image: fnsys/dockhand:latest
    container_name: dockhand
    restart: unless-stopped
    entrypoint:
      ['/sbin/tini', '--', '/init.sh -f /run/secrets/locket/encryption_key']
    cmd: ['/usr/local/bin/docker-entrypoint.sh']
    group_add:
      - 999 #docker group
    ports:
      - '3000:3000'
    volumes:
      - ../../common/scripts/init.sh:/init.sh:ro
      - secrets-store-dockhand:/run/secrets/locket
      - /var/run/docker.sock:/var/run/docker.sock
      - /app/data:/app/data
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago

secrets:
  op_token:
    file: /etc/op/token

volumes:
  secrets-store-dockhand:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
