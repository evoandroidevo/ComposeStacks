# Port Mapping:
# Sonarr: 8989
# Radarr: 7878
# qBittorrent: 8080 (WebUI), 6881 (TCP/UDP)
# Prowlarr: 9696
# Seerr: 5055
# Tracearr: 3000
# TracearrDB: 5432
# Tracearr Redis: 6379
# Scraparr: 7100
# Qui: 7476
# Autobrr: 7474
# Flaresolverr: 8191
# Wizarr: 5690
# Profilarr: 6869

services:
  locket:
    image: ghcr.io/bpbradley/locket:op
    container_name: locket-arrstack
    user: "65532:101000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      - "--mode=park"
      - "--inject-failure-policy=error"
      - "--op-token=file:/run/secrets/op_token"
      - "--file-mode=0664"
      - "--dir-mode=0775"
      # - "--map=/scraparr:/run/secrets/locket/scraparr"
      # - "--map=/qui:/run/secrets/locket/qui"
      # - "--map=/tracearrdb:/run/secrets/locket/tracearrdb"
      - "--map=/sonarr:/run/secrets/locket/sonarr"
      - "--map=/radarr:/run/secrets/locket/radarr"
      - "--map=/prowlarr:/run/secrets/locket/prowlarr"
      - "--secret=profilarr_origin={{ op://DockerSecrets/arr-stack/profilarr-origin }}"
    volumes:
      # - ./config/scraparr:/scraparr:ro
      # - ./config/qui:/qui:ro
      # - ./config/tracearrdb:/tracearrdb:ro
      - ./config/sonarr:/sonarr:ro
      - ./config/radarr:/radarr:ro
      - ./config/prowlarr:/prowlarr:ro
      - secrets-store-arrstack:/run/secrets/locket
    secrets:
      - op_token
    restart: unless-stopped

  sonarr:
    image: ghcr.io/linuxserver/sonarr:latest
    container_name: sonarr
    user: "101000:101000"
    restart: no
    depends_on:
      locket:
        condition: service_healthy
    environment:
      - TZ=America/Chicago
    volumes:
      - sonarr-arrstack:/config
      - nas-media:/media
      - type: volume
        source: secrets-store-arrstack
        target: /config/config.xml
        volume:
          subpath: sonarr/config.xml
    expose:
      - 8989
    networks:
      - default
      - proxy

  radarr:
    image: ghcr.io/linuxserver/radarr:latest
    container_name: radarr
    user: "101000:101000"
    restart: no
    depends_on:
      locket:
        condition: service_healthy
    environment:
      - TZ=America/Chicago
    volumes:
      - radarr-arrstack:/config
      - nas-media:/media
      - type: volume
        source: secrets-store-arrstack
        target: /config/config.xml
        volume:
          subpath: radarr/config.xml
    expose:
      - 7878
    networks:
      - default
      - proxy

  prowlarr:
    image: ghcr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    user: "101000:101000"
    restart: no
    depends_on:
      locket:
        condition: service_healthy
    environment:
      - TZ=America/Chicago
    volumes:
      - prowlarr-arrstack:/config
      - type: volume
        source: secrets-store-arrstack
        target: /config/config.xml
        volume:
          subpath: prowlarr/config.xml
    expose:
      - 9696
    networks:
      - default
      - proxy

  qbittorrent:
    image: ghcr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    user: "101000:101000"
    restart: unless-stopped
    environment:
      - TZ=America/Chicago
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - qbittorrent-arrstack:/config
      - type: volume
        source: nas-media
        target: /downloads
        volume:
          subpath: Torrents
    expose:
      - 8080
    ports:
      - "6881:6881"
      - "6881:6881/udp"
    stop_grace_period: "10s"
    networks:
      - default
      - proxy

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FILE=${LOG_FILE:-none}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=America/Chicago
    expose:
      - 8191
    volumes:
      - flaresolver-data:/config

