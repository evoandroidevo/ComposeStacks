  #     - proxy

  # autobrr:
  #   image: autobrr/autobrr:latest
  #   container_name: autobrr
  #   user: "1000:1000"
  #   environment:
  #     - TZ=America/Chicago
  #     - AUTOBRR__BASE_URL="/autobrr/"
  #     - AUTOBRR__HOST=0.0.0.0
  #   volumes:
  #     - autobrr-arrstack:/config
  #   expose:
  #     - 7474
  #   restart: unless-stopped
  #   networks:
  #     - default
  #     - proxy

  # TODO: investigate how profilarr handles config files, check if they can be added to the repo for no setup on first run
  profilarr:
    image: ghcr.io/dictionarry-hub/profilarr:latest
    container_name: profilarr
    user: "101000:101000"
    restart: no
    depends_on:
      locket:
        condition: service_healthy
    environment:
      - PUID=1000
      - PGID=1000
      - PORT=6869
      - HOST=0.0.0.0
      - UMASK=0022
      - TZ=America/Chicago
      - ORIGIN_FILE=/run/secrets/profilarr_origin # TODO: check if locket adds a trailing newline to the secret file, if so, we need to trim it before using it
    volumes:
      - profilarr-arrstack:/config
      - type: volume
        source: secrets-store-arrstack
        target: /run/secrets/profilarr_origin
        read_only: true
        volume:
          subpath: profilarr_origin
    expose:
      - 6869
    networks:
      - default
      - proxy

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - port=5055
    expose:
      - 5055
    volumes:
      - seerr-data-arrstack:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
    networks:
      - default
      - proxy

