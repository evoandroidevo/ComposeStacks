networks:
  proxy:
    external: true

secrets:
  op_token:
    file: /etc/op/token

volumes:
  nas-media:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=192.168.1.21,rw,nfsvers=4,nolock,soft"
      device: ":/mnt/thehub/Data/Media"
  sonarr-arrstack:
    driver: local
  radarr-arrstack:
    driver: local
  prowlarr-arrstack:
    driver: local
  flaresolver-data:
    driver: local
  qbittorrent-arrstack:
    driver: local
  # qui-arrstack:
  #   driver: local
  # autobrr-arrstack:
  #   driver: local
  profilarr-arrstack:
    driver: local
  # scraparr-arrstack:
  #   driver: local
  # tracarr-arrstack:
  #   driver: local
  # tracearrdb-arrstack:
  #   driver: local
  # redis_data:
  #   driver: local
  # wizarr-arrstack:
  #   driver: local
  seerr-data-arrstack:
    driver: local
  secret-store-arrstack:
    driver: local
    driver_opts:
      type: tempfs
      device: tmpfs
