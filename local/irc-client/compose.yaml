services:
  thelounge:
    image: ghcr.io/thelounge/thelounge:latest
    container_name: thelounge
    ports:
      - '9000:9000'
    restart: unless-stopped
    volumes:
      - thelounge-data:/var/opt/thelounge # bind lounge config from the host's file system

volumes:
  thelounge-data:
    driver: local
