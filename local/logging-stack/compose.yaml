services:
  # meta service will be ignored by compose
  .victorialogs:
    image: docker.io/victoriametrics/victoria-logs:v1.51.0
    command:
      - -storageDataPath=/vlogs
      - -loggerFormat=json
      - -datadog.streamFields=service,hostname,ddsource
      - -journald.streamFields=_HOSTNAME,_SYSTEMD_UNIT,_PID
      - -journald.ignoreFields=MESSAGE_ID,INVOCATION_ID,USER_INVOCATION_ID
      - -journald.ignoreFields=_BOOT_ID,_MACHINE_ID,_SYSTEMD_INVOCATION_ID,_STREAM_ID,_UID
    deploy:
      replicas: 0

  vmauth:
    image: docker.io/victoriametrics/vmauth:v1.132.0
    restart: on-failure
    volumes:
      - ./config/victorialogs-vector/vector.yaml:/etc/vmauth/vmauth.yml
    command: -auth.config=/etc/vmauth/vmauth.yml
    ports:
      - "8427:8427"
    depends_on:
      victorialogs-1:
        condition: service_started
      victorialogs-2:
        condition: service_started

  victorialogs-1:
    extends: .victorialogs
    volumes:
      - victorialogs-1:/vlogs
    deploy:
      replicas: 1

  victorialogs-2:
    extends: .victorialogs
    volumes:
      - victorialogs-2:/vlogs
    deploy:
      replicas: 1

  vlagent:
    image: victoriametrics/vlagent:v1.51.0
    volumes:
      - vlagent:/vlagent
    command:
      - "--remoteWrite.tmpDataPath=/vlagent"
      - "--remoteWrite.url=http://victorialogs-1:9428/insert/native"
      - "--remoteWrite.url=http://victorialogs-2:9428/insert/native"
      - "--syslog.listenAddr.tcp=0.0.0.0:8094"
    depends_on:
      victorialogs-1:
        condition: service_started
      victorialogs-2:
        condition: service_started

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.132.0
    command:
      - -storageDataPath=/vmsingle
      - -loggerFormat=json
    volumes:
      - victoriametrics:/vmsingle

  vector:
    image: docker.io/timberio/vector:0.56.X-distroless-libc
    restart: on-failure
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
      - type: bind
        source: /var/lib/docker
        target: /var/lib/docker
      - ./config/victorialogs-vector/vector.yaml:/etc/vector/vector.yaml:ro
    user: root
    ports:
      - "8686:8686"
    depends_on:
      vmauth:
        condition: service_started
      vlagent:
        condition: service_started
      victoriametrics:
        condition: service_started

  grafana:
    image: grafana/grafana-enterprise:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER_FILE: admin
      GF_SECURITY_ADMIN_PASSWORD_FILE: your_secure_password
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana-storage:/var/lib/grafana

volumes:
  victorialogs-1:
  victorialogs-2:
  victoriametrics:
  vlagent:
