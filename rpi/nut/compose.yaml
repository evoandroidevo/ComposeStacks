services:
  locket:
    image: ghcr.io/bpbradley/locket:op
    user: '65532:65532'
    container_name: locket-nut
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
  command:
      - "--provider=op"
      # Park is needed otherwise when the continer exits it will remove the files creates in the tempfs volume
      - "--mode=park"
      - "--inject-failure-policy=error"
      - "--log-level=info"
      - "--user=65532:1000"
      # -rw-r----- file mode
      - "--file-mode=0640"
      - "--dir-mode=0740"
      - "--op-token=file:/run/secrets/op_token"
      # Dockhand needs the Encryption key to be 32 bytes
      - "--secret="
      # --secret=file name=file contents
      secrets:
      - op_token
    volumes:
      - secrets-store-nut:/run/secrets/locket

  nut:
    image: instantlinux/nut-upsd:latest
    container_name: nut
    restart: always
    depends_on:
      locket:
        condition: service-healthy
    environment:
      NUT_DEBUG_LEVEL: 0
    ports:
      - 3493:3493
    volumes:
      - nut-data:/etc/nut/local

  peanut:
    image: brandawg93/peanut:latest
    container_name: PeaNUT
    restart: unless-stopped
    # TODO: check if the nut container has health checks
    depends_on:
      nut:
        condition: service started
    volumes:
      - peanut-data:/config
    ports:
      - 8080:8080
    environment:
      - WEB_PORT=8080

secrets:
  op_token:
    file: /etc/op/token

volumes:
  nut-data:
    driver: local
  peanut-data:
    driver: local
  secrets-store-agent:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs